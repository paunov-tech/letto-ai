<!DOCTYPE html>
<html lang="sr-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Već si pretplaćen? · LETTO</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,300;1,400&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F7F1E3;
    color: #0C0E10;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(184,134,59,0.12) 0%, transparent 50%),
      radial-gradient(ellipse 70% 50% at 85% 80%, rgba(124,30,41,0.08) 0%, transparent 50%);
    z-index: 0;
  }
  .container { max-width: 520px; width: 100%; text-align: center; position: relative; z-index: 1; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.05;
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, #8A5F1F 0%, #B8863B 25%, #E4C37A 50%, #B8863B 75%, #8A5F1F 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% 200%;
    animation: gold-shimmer 6s ease-in-out infinite;
  }
  @keyframes gold-shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .lead {
    font-family: 'Instrument Serif', serif;
    font-size: 19px;
    color: #3A3F47;
    line-height: 1.5;
    max-width: 460px;
    margin: 0 auto 36px;
  }

  form {
    background: white;
    border: 1px solid #D4C9AE;
    border-radius: 8px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(12,14,16,0.06);
    text-align: left;
  }
  label {
    display: block;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 8px;
    color: #0C0E10;
  }
  input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #D4C9AE;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #0C0E10;
    background: #FBF7EB;
    margin-bottom: 16px;
  }
  input[type="email"]:focus {
    outline: none;
    border-color: #B8863B;
    background: white;
  }
  button {
    width: 100%;
    padding: 14px 24px;
    background: linear-gradient(135deg, #8A5F1F 0%, #B8863B 50%, #8A5F1F 100%);
    border: none;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #F7F1E3;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .hint {
    font-family: 'Instrument Serif', serif;
    font-size: 14px;
    color: #6B5E47;
    margin-top: 16px;
    text-align: center;
    line-height: 1.5;
  }
  .result {
    margin-top: 20px;
    padding: 16px;
    background: #EFE5CE;
    border-radius: 6px;
    font-family: 'Instrument Serif', serif;
    font-size: 15px;
    color: #0C0E10;
    line-height: 1.5;
    display: none;
  }
  .result.shown { display: block; }
  .result.error { background: #F4D5D8; color: #7C1E29; }

  .back {
    display: inline-block;
    margin-top: 28px;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid #0C0E10;
    border-radius: 999px;
    color: #0C0E10;
    text-decoration: none;
    font-size: 13px;
  }
  .back:hover { background: #0C0E10; color: #F7F1E3; }
</style>
<!-- Sentry · letto-prod (EU region) · GDPR-aware -->
<script
  src="https://js-de.sentry-cdn.com/971aff07cdaeabfc32b5ddd87c492819.min.js"
  crossorigin="anonymous"
  defer
></script>
<script>
  window.sentryOnLoad = function () {
    Sentry.init({
      sendDefaultPii: false,
      tracesSampleRate: 0.1,
      replaysSessionSampleRate: 0,
      replaysOnErrorSampleRate: 0,
      environment: 'production',
      beforeSend: function (event) {
        if (event.request) {
          delete event.request.cookies;
          delete event.request.query_string;
        }
        return event;
      }
    });
  };
</script>
<script src="/consent.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Već si <em>pretplaćen</em>?</h1>
    <p class="lead">Unesi email vezan za tvoju Letto Premium pretplatu i poslaćemo ti pristupne linkove (Telegram kanal + Stripe portal za otkazivanje).</p>

    <form id="recovery-form" novalidate>
      <label for="email">Email adresa</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="ti@gmail.com">
      <button type="submit" id="submit">Pošalji pristupne linkove</button>
      <p class="hint">Ako tvoj email ima aktivnu pretplatu, dobićeš email za ~30 sekundi.</p>
    </form>

    <div id="result" class="result"></div>

    <a class="back" href="/">← nazad na letto.live</a>
  </div>

<script>
  (function () {
    var form = document.getElementById('recovery-form');
    var submitBtn = document.getElementById('submit');
    var result = document.getElementById('result');
    if (!form) return;

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var email = (document.getElementById('email').value || '').trim();
      if (!email || email.indexOf('@') === -1) {
        showResult('Unesi validan email.', true);
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Šaljem...';
      result.classList.remove('shown', 'error');

      try {
        var res = await fetch('/api/recovery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        var data = await res.json().catch(function () { return {}; });
        if (res.ok && data.sent) {
          showResult('Ako tvoj email ima aktivnu Letto Premium pretplatu, poslali smo ti pristupne linkove. Proveri inbox + spam folder za narednih nekoliko minuta.', false);
          form.reset();
        } else {
          showResult('Greška: ' + (data.error || ('HTTP ' + res.status)) + '. Pokušaj ponovo ili napiši na info@letto.live.', true);
        }
      } catch (err) {
        showResult('Mreža nedostupna. Pokušaj ponovo za par sekundi.', true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Pošalji pristupne linkove';
      }
    });

    function showResult(msg, isError) {
      result.textContent = msg;
      result.classList.add('shown');
      result.classList.toggle('error', !!isError);
    }
  })();
</script>
</body>
</html>
